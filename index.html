<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mailingo — Resume Mailer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== Animated Background Blobs ===== */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #0ea5e9; top: -120px; left: -100px; animation: float1 18s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -80px; right: -80px; animation: float2 22s ease-in-out infinite; }
    .blob-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 60%; animation: float3 20s ease-in-out infinite; }

    @keyframes float1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,80px) scale(1.1); } }
    @keyframes float2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,-60px) scale(1.15); } }
    @keyframes float3 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-40px,50px) scale(0.9); } }

    /* ===== Container ===== */
    .container { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 60px 20px 80px; }

    /* ===== Header ===== */
    .header { text-align: center; margin-bottom: 40px; }
    .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
    .logo-icon { font-size: 36px; }
    .logo-text {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { font-size: 15px; color: #64748b; font-weight: 400; }

    /* ===== Cards ===== */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .card-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #f1f5f9; }
    .card-desc { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }

    /* ===== Form ===== */
    .input-group { display: flex; gap: 10px; }
    #emailInput {
      flex: 1;
      padding: 14px 18px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #emailInput::placeholder { color: #64748b; }
    #emailInput:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }

    #sendBtn {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
      min-width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #sendBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.35); }
    #sendBtn:active { transform: translateY(0); }
    #sendBtn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    /* ===== Spinner ===== */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* ===== Toast ===== */
    .toast { margin-top: 16px; padding: 12px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; text-align: center; animation: slideUp 0.3s ease; }
    .toast.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
    .toast.error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== History ===== */
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .history-header .card-title { margin-bottom: 0; }
    .refresh-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #94a3b8;
      font-size: 18px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .refresh-btn:hover { background: rgba(14,165,233,0.12); color: #0ea5e9; transform: rotate(180deg); }

    .history-list { max-height: 360px; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .empty-state { text-align: center; color: #475569; font-size: 14px; padding: 24px 0; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.06); }
    .history-item .email { font-size: 14px; font-weight: 500; color: #e2e8f0; word-break: break-all; }
    .history-item .meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: 16px; }
    .history-item .time { font-size: 12px; color: #64748b; white-space: nowrap; }

    .status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-badge.sent { background: rgba(16,185,129,0.12); color: #34d399; }
    .status-badge.failed { background: rgba(239,68,68,0.12); color: #f87171; }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .container { padding: 40px 16px 60px; }
      .card { padding: 24px 20px; }
      .input-group { flex-direction: column; }
      #sendBtn { width: 100%; }
      .logo-text { font-size: 28px; }
      .logo-icon { font-size: 28px; }
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">✉</span>
        <span class="logo-text">Mailingo</span>
      </div>
      <p class="tagline">Send your resume with a single click</p>
    </header>

    <!-- Send Card -->
    <div class="card send-card">
      <h2 class="card-title">Send Resume</h2>
      <p class="card-desc">Enter the recruiter's email and your resume will be delivered with a beautifully designed cover message.</p>
      <form id="mailForm" class="mail-form">
        <div class="input-group">
          <input
            type="email"
            id="emailInput"
            placeholder="recruiter@company.com"
            autocomplete="email"
            required
          />
          <button type="submit" id="sendBtn">
            <span class="btn-text">Send</span>
            <span class="btn-loader hidden">
              <span class="spinner"></span>
            </span>
          </button>
        </div>
      </form>
      <div id="toast" class="toast hidden"></div>
    </div>

    <!-- History Card -->
    <div class="card history-card">
      <div class="history-header">
        <h2 class="card-title">Sent History</h2>
        <button id="refreshBtn" class="refresh-btn" title="Refresh">↻</button>
      </div>
      <div id="historyList" class="history-list">
        <p class="empty-state">No mails sent yet.</p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
